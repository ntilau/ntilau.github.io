const v = document.getElementById('v');
const osd = document.getElementById('osd');
const chName = document.getElementById('ch-name');
const chIdx = document.getElementById('ch-idx');
let idx = 0, osdTimer, hls;

function dropChannel(i) {
  channels.splice(i, 1);
  if (channels.length === 0) {
    document.title = 'No streams';
    chName.textContent = 'All streams failed';
    chIdx.textContent = '';
    return;
  }
  if (i <= idx) idx--;
  load(idx < 0 ? 0 : idx + 1);
}

function load(i) {
  if (channels.length === 0) return;
  idx = ((i % channels.length) + channels.length) % channels.length;
  const ch = channels[idx];
  document.title = ch.name;
  chName.textContent = ch.name;
  chIdx.textContent = (idx + 1) + '/' + channels.length;
  function showOsd() {
    osd.classList.add('show');
    clearTimeout(osdTimer);
    osdTimer = setTimeout(() => osd.classList.remove('show'), 1800);
  }

  if (hls) { hls.destroy(); hls = null; }
  v.pause();
  v.removeAttribute('src');
  v.load();

  function fail() {
    dropChannel(idx);
  }

  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(ch.url);
    hls.attachMedia(v);
    hls.on(Hls.Events.ERROR, (evt, data) => {
      if (data.fatal) fail();
    });
    hls.on(Hls.Events.MANIFEST_PARSED, () => v.play().catch(() => {}));
  } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
    v.src = ch.url;
    v.onerror = fail;
    v.play().catch(() => {});
  }
  v.addEventListener('playing', showOsd, {once: true});
}

document.addEventListener('keydown', e => {
  if (e.key === 'PageDown' || e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    load(idx + 1);
  } else if (e.key === 'PageUp' || e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    load(idx - 1);
  }
});

let touchStartX = 0, touchSwiped = false;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchSwiped = false;
}, {passive: true});
document.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - touchStartX;
  if (Math.abs(dx) < 100 || touchSwiped) return;
  e.preventDefault();
  touchSwiped = true;
  load(idx + (dx > 0 ? 1 : -1));
}, {passive: false});

let swipeTimer, swipeTotal = 0;
document.addEventListener('wheel', e => {
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) return;
  swipeTotal += e.deltaX;
  if (Math.abs(swipeTotal) < 200) return;
  e.preventDefault();
  clearTimeout(swipeTimer);
  const dir = swipeTotal > 0 ? 1 : -1;
  swipeTotal = 0;
  swipeTimer = setTimeout(() => { swipeTotal = 0; }, 150);
  load(idx + dir);
}, {passive: false});

document.addEventListener('click', () => {
  v.muted = false;
  v.play().catch(() => {});
  v.requestFullscreen().catch(() => {});
});

load(0);
</script>
